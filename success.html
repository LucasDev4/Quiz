<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Success</title>
</head>

<body>
    <main class="sucess" id="resultContainer">

        <h2>A linguagem que combina com você é:</h2>
        <section class="containerSucess">
            <section class="gira">

                <section class="front">

                    <img id="resultIcon">

                    <h2 id="resultName"></h2>

                    <hr>

                    <p id="resultDesc1"></p>

                    <p id="resultDesc2"></p>

                    <p id="resultProfile"></p>

                </section>


                <section class="back">
                    <button id="resultPercent">Compatibilidade: 0%</button>
                    
                    <img id="resultCharacter">
                    
                </section>
            </section>
        </section>
        <section class="actions">
            <button id="comeback">Refazer o Quiz</button>

            <button id="shareBtn">Compartilhar</button>
        </section>

    </main>


    <script src="sucess.js"></script>

</body>

</html>
